<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>onlygay</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Arial', sans-serif;
            background-color: #f0f0f0;
            overflow: hidden;
        }
        h1 {
            color: #333;
        }
        .container {
            text-align: center;
            background: white;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .buttons {
            margin-top: 30px;
            position: relative;
            height: 100px;
            width: 300px;
        }
        button {
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
            border: none;
            border-radius: 10px;
            transition: transform 0.2s;
        }
        #yesBtn {
            background-color: #4CAF50;
            color: white;
        }
        #noBtn {
            background-color: #f44336;
            color: white;
            position: absolute;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 id="question">Are you gay?</h1>
        <div class="buttons">
            <button id="yesBtn" onclick="sayWtf()">Yes</button>
            <button id="noBtn" onmouseover="moveButton()" onclick="stillGay()">No</button>
        </div>
    </div>

    <script>
        let noClickCount = 0;

        // Function for the Yes button
        function sayWtf() {
            document.getElementById('question').innerText = "wtf";
            alert("wtf");
        }

        // Function to move the No button so it can't be clicked
        function moveButton() {
            const noBtn = document.getElementById('noBtn');
            
            // Generate random coordinates within the screen
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
            
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
        }

        // Function if they somehow manage to click the No button
        function stillGay() {
            noClickCount++;
            if (noClickCount >= 1) {
                document.getElementById('question').innerText = "You are still gay";
                alert("Nice try, but you are still gay.");
            }
        }
    </script>
</body>
</html>
