<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>onlygay</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f0f2f5;
            margin: 0;
        }
        .container {
            text-align: center;
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
        }
        button {
            padding: 10px 25px;
            font-size: 1rem;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            margin: 10px;
            transition: transform 0.2s;
        }
        .yes-btn {
            background-color: #ff4757;
            color: white;
        }
        .no-btn {
            background-color: #2f3542;
            color: white;
        }
        button:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body>

    <div class="container" id="box">
        <h1 id="question">why are you gay?</h1>
        <button class="yes-btn" onclick="sayWTF()">Yes</button>
        <button class="no-btn" onclick="sayNothing()">No</button>
    </div>

    <script>
        function sayWTF() {
            // Changes the text to "wtf"
            document.getElementById('question').innerHTML = "wtf";
            
            // Removes the buttons after clicking
            const buttons = document.querySelectorAll('button');
            buttons.forEach(btn => btn.style.display = 'none');
        }

        function sayNothing() {
            alert("Understandable, have a nice day.");
        }
    </script>

</body>
</html>
