<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>onlygay</title>
    <style>
        :root {
            --primary: #ff0080;
            --secondary: #7928ca;
            --bg-gradient: linear-gradient(45deg, #ff004c, #ff8c00, #ffee00, #44ff00, #00bbff, #2b00ff, #9100ff);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Poppins', sans-serif;
            background: #0a0a0a;
            overflow: hidden;
            color: white;
        }

        /* Animated Rainbow Border */
        .outer-frame {
            position: relative;
            padding: 5px;
            border-radius: 40px;
            background: var(--bg-gradient);
            background-size: 300% 300%;
            animation: flow 5s linear infinite;
        }

        @keyframes flow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            background: #111;
            padding: 60px;
            border-radius: 35px;
            text-align: center;
            width: 500px;
            min-height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: #fff;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-image: linear-gradient(to right, #fff, #888);
        }

        .subtitle {
            color: #888;
            margin-bottom: 40px;
            font-style: italic;
        }

        /* The Progress Bar (The "Length" Factor) */
        .progress-container {
            width: 100%;
            height: 10px;
            background: #222;
            border-radius: 10px;
            margin-bottom: 30px;
            display: none;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: var(--bg-gradient);
            background-size: 200%;
            border-radius: 10px;
            transition: width 0.4s;
        }

        .btn-wrapper {
            display: flex;
            justify-content: center;
            gap: 30px;
            height: 70px;
            align-items: center;
        }

        .btn {
            padding: 18px 45px;
            font-size: 1.2rem;
            font-weight: 800;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        #yesBtn {
            background: white;
            color: black;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        #yesBtn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.4);
        }

        #noBtn {
            background: #ff004c;
            color: white;
            position: fixed; /* Fixed so it moves relative to the whole screen */
            z-index: 999;
        }

        /* Floating particles for extra beauty */
        .particle {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="outer-frame">
        <div class="container">
            <div class="progress-container" id="progCont">
                <div class="progress-bar" id="progBar"></div>
            </div>
            
            <h1 id="mainTitle">Are you gay?</h1>
            <p class="subtitle" id="subTitle">Please be honest with yourself.</p>

            <div class="btn-wrapper">
                <button class="btn" id="yesBtn" onclick="onYes()">Yes</button>
                <button class="btn" id="noBtn" onmouseover="teleport()" onclick="onNo()">No</button>
            </div>
        </div>
    </div>

    <script>
        const title = document.getElementById('mainTitle');
        const sub = document.getElementById('subTitle');
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const progCont = document.getElementById('progCont');
        const progBar = document.getElementById('progBar');

        let clickCount = 0;

        // Set initial position of No button
        function setInitialNo() {
            const rect = yesBtn.getBoundingClientRect();
            noBtn.style.left = (rect.right + 30) + 'px';
            noBtn.style.top = rect.top + 'px';
        }
        window.onload = setInitialNo;

        function teleport() {
            // Make the button run away
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth - 20);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight - 20);
            
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
            
            // Easter egg: make the "Yes" button bigger each time they try to hit "No"
            const currentSize = parseFloat(window.getComputedStyle(yesBtn).fontSize);
            if (currentSize < 60) {
                yesBtn.style.fontSize = (currentSize + 2) + 'px';
                yesBtn.style.padding = (parseFloat(window.getComputedStyle(yesBtn).paddingTop) + 1) + 'px ' + 
                                       (parseFloat(window.getComputedStyle(yesBtn).paddingLeft) + 2) + 'px';
            }
        }

        function onYes() {
            // Stage 1: The wtf
            title.innerText = "wtf";
            title.style.webkitTextFillColor = "#ff004c";
            sub.innerText = "Processing your honesty...";
            yesBtn.style.display = "none";
            noBtn.style.display = "none";
            progCont.style.display = "block";

            // Artificial loading for "Long" effect
            let width = 0;
            const interval = setInterval(() => {
                if (width >= 100) {
                    clearInterval(interval);
                    finish();
                } else {
                    width++;
                    progBar.style.width = width + "%";
                }
            }, 30);
        }

        function finish() {
            title.innerText = "Confirmed.";
            sub.innerText = "The database has been updated. Have a fabulous day.";
            document.body.style.background = "var(--bg-gradient)";
            document.body.style.backgroundSize = "400% 400%";
        }

        function onNo() {
            // This only triggers if they are fast enough or use Inspect Element
            clickCount++;
            title.innerText = "You are still gay";
            title.style.fontSize = "2rem";
            sub.innerText = `Attempt #${clickCount} to deny the truth failed.`;
            
            // Shake effect
            const container = document.querySelector('.container');
            container.style.animation = "none";
            setTimeout(() => container.style.animation = "shake 0.5s", 10);
        }
    </script>

    <style>
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            50% { transform: translate(-1px, 2px) rotate(1deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            100% { transform: translate(1px, -2px) rotate(0deg); }
        }
    </style>
</body>
</html>
