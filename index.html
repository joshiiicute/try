<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>onlygay</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            overflow: hidden;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .card {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            padding: 3rem;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            text-align: center;
            width: 350px;
        }

        h1 {
            color: white;
            font-size: 2.5rem;
            margin-bottom: 2rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            height: 60px;
        }

        button {
            padding: 12px 35px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        #yesBtn {
            background: #ffffff;
            color: #e73c7e;
        }

        #yesBtn:hover {
            transform: scale(1.1);
            background: #ffe6f0;
        }

        #noBtn {
            background: #333;
            color: white;
            position: absolute;
            z-index: 10;
        }

        /* Smooth movement for the No button */
        .moving {
            transition: all 0.2s ease-out !important;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1 id="mainText">Are you gay?</h1>
        <div class="btn-group">
            <button id="yesBtn" onclick="handleYes()">Yes</button>
            <button id="noBtn" onmouseover="dodge()" onclick="handleNo()">No</button>
        </div>
    </div>

    <script>
        const mainText = document.getElementById('mainText');
        const noBtn = document.getElementById('noBtn');
        let clickCount = 0;

        function handleYes() {
            mainText.innerText = "wtf";
            mainText.style.color = "#fff";
            document.querySelector('.btn-group').style.display = 'none';
        }

        function dodge() {
            // Add the moving class for smooth transition
            noBtn.classList.add('moving');
            
            // Calculate random positions
            // Staying within 80% of the viewport to keep it visible
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth - 40);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight - 40);
            
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
        }

        function handleNo() {
            clickCount++;
            if(clickCount > 0) {
                mainText.innerText = "You are still gay";
                mainText.style.fontSize = "1.8rem";
            }
        }
    </script>
</body>
</html>
